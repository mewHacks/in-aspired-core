name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # Node.js backend tests
  test:
    name: Run Tests (Node.js)
    runs-on: ubuntu-latest
    
    # Mock environment variables for testing
    env:
      JWT_SECRET: "test-jwt-secret-key-123"
      MONGODB_URI: "mongodb://127.0.0.1:27017/in-aspired-test"
      CLIENT_URL: "http://localhost:5173"
      NODE_ENV: "test"
      TWO_FACTOR_ENCRYPTION_KEY: "test-two-factor-encryption-key-123"

    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0
        ports:
          - 6379:6379

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build shared module
      run: npm run build -w shared

    - name: Run Backend Tests
      run: npm test -w server/node-backend

    - name: Run Frontend Tests
      run: npm test -w client

